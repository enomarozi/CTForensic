{% extends "index/app.html" %}
{% load static %}
{% block content %}

<div class="container-fluid py-4">
  <div class="row g-4">

    <!-- Card -->
    <div class="col-12 col-md-6 col-lg-4">
      <a href="{% url 'image_forensics' %}" class="text-decoration-none">
        <div class="card h-100 text-center shadow-sm border-0 forensic-card">
          <div class="card-body d-flex flex-column justify-content-center">
            <i class="bi bi-image fs-1 mb-3 text-primary"></i>
            <h5 class="card-title fw-semibold">Image Forensics</h5>
            <p class="text-muted small mb-0">Analisis keaslian gambar</p>
          </div>
        </div>
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <a href="audio_forensics.html" class="text-decoration-none">
        <div class="card h-100 text-center shadow-sm border-0 forensic-card">
          <div class="card-body d-flex flex-column justify-content-center">
            <i class="bi bi-mic fs-1 mb-3 text-success"></i>
            <h5 class="card-title fw-semibold">Audio Forensics</h5>
            <p class="text-muted small mb-0">Analisis rekaman suara</p>
          </div>
        </div>
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <a href="log_forensics.html" class="text-decoration-none">
        <div class="card h-100 text-center shadow-sm border-0 forensic-card">
          <div class="card-body d-flex flex-column justify-content-center">
            <i class="bi bi-file-text fs-1 mb-3 text-warning"></i>
            <h5 class="card-title fw-semibold">Log Forensics</h5>
            <p class="text-muted small mb-0">Analisis file log sistem</p>
          </div>
        </div>
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <a href="{% url 'memory_forensics' %}" class="text-decoration-none">
        <div class="card h-100 text-center shadow-sm border-0 forensic-card">
          <div class="card-body d-flex flex-column justify-content-center">
            <i class="bi bi-memory fs-1 mb-3 text-danger"></i>
            <h5 class="card-title fw-semibold">Memory Forensics</h5>
            <p class="text-muted small mb-0">Analisis memori sistem</p>
          </div>
        </div>
      </a>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <a href="{% url 'network_forensics' %}" class="text-decoration-none">
        <div class="card h-100 text-center shadow-sm border-0 forensic-card">
          <div class="card-body d-flex flex-column justify-content-center">
            <i class="bi bi-diagram-3 fs-1 mb-3 text-info"></i>
            <h5 class="card-title fw-semibold">Network Forensics</h5>
            <p class="text-muted small mb-0">Analisis jaringan</p>
          </div>
        </div>
      </a>
    </div>

  </div>
</div>

<!-- Tambahan CSS -->
<style>
  .forensic-card {
    transition: all 0.25s ease;
    border-radius: 12px;
  }

  .forensic-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }
</style>

{% endblock content %}
