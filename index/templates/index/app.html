{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{{ title }}</title>
        <link rel="icon" href="{% static 'img/icon.png' %}" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
    </head>
    <body>
    <nav id="navbar" class="navbar navbar-light bg-white border-bottom shadow-sm px-3 fixed-top">
        <div class="d-flex align-items-center">
            <img src="{% static 'img/logo.png' %}" alt="Logo" style="height: 45px;" class="me-2">
            <button class="btn btn-outline-secondary" id="toggleSidebar">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>

        <div class="ms-auto dropdown">
            <button class="btn d-flex align-items-center gap-2" data-bs-toggle="dropdown">
                {{ user.username }} <i class="bi bi-person-circle fs-4"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{% url 'pengaturan' %}">Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="{% url 'keluar' %}">Logout</a></li>
            </ul>
        </div>
    </nav>
    <div id="sidebar" class="position-fixed bg-white border-end shadow-sm d-flex flex-column p-3"
         style="top: 60px; width: 270px; transition: width 0.3s; height: calc(100vh - 60px); overflow: hidden;">
        <ul class="nav nav-pills flex-column gap-2 flex-grow-1">
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center {% if request.path == '/' %}active{% endif %}" href="{% url 'index' %}">
                    <span class="icon-wrapper">
                        <i class="bi bi-house-door fs-5"></i>
                    </span>
                    <span class="menu-text ms-2">Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center {% if 'image' in request.path %}active{% endif %}" href="{% url 'image_forensics' %}">
                    <span class="icon-wrapper">
                        <i class="bi bi-eye fs-5"></i>
                    </span>
                    <span class="menu-text ms-2">Image Forensics</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center {% if 'network' in request.path %}active{% endif %}" href="{% url 'network_forensics' %}">
                    <span class="icon-wrapper">
                        <i class="bi bi-file-earmark-text fs-5"></i>
                    </span>
                    <span class="menu-text ms-2">Network Forensics</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center {% if 'memory' in request.path %}active{% endif %}" href="{% url 'memory_forensics' %}">
                    <span class="icon-wrapper">
                        <i class="bi bi-memory fs-5"></i>
                    </span>
                    <span class="menu-text ms-2">Memory Forensics</span>
                </a>
            </li>
        </ul>
    </div>

    <main id="mainContent" class="flex-grow-1 p-5 mt-5" style="margin-left: 270px; transition: margin-left 0.3s;">
        {% block content %}
        {% endblock content %}

        {% if messages %}
            <script>
                {% for message in messages %}
                    Swal.fire({
                        icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
                        title: "Info",
                        text: "{{ message|escapejs }}",
                        confirmButtonText: "OK"
                    });
                {% endfor %}
            </script>
        {% endif %}
    </main>
    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebar');
        const main = document.getElementById('mainContent');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');

            const texts = sidebar.querySelectorAll('.menu-text');

            if (sidebar.classList.contains('collapsed')) {
                texts.forEach(t => t.style.display = 'none');
                sidebar.style.width = '90px';
                main.style.marginLeft = '90px'; 
            } else {
                sidebar.style.width = '270px';
                main.style.marginLeft = '270px';
                setTimeout(() => {
                    texts.forEach(t => t.style.display = 'inline');
                }, 250);
            }
        });
    </script>

</body>
</html>
