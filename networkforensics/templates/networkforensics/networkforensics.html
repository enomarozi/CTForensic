{% extends "index/app.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Input File 
                        <small class="text-muted">(PCAP, PCAPNG)</small>
                        <span id="showMoreBtn" class="text-primary fw-semibold text-decoration-underline ms-2" style="cursor:pointer;">
                            Show More
                        </span>
                    </label>

                    <input class="form-control mt-2" type="file" name="file" required>
                </div>

                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-upload me-1"></i> Upload
                </button>

            </form>

        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table id="statusTable" class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Size</th>
                        <th>Extension</th>
                        <th>Action</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

</div>

<div class="modal fade" id="myModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Extension Support</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <ul class="mb-0">
                    <li>PCAP</li>
                    <li>PCAPNG</li>
                </ul>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const showMoreBtn = document.getElementById('showMoreBtn');
        const modalEl = document.getElementById('myModal');
        const modal = new bootstrap.Modal(modalEl);

        showMoreBtn.addEventListener('click', function () {
            modal.show();
        });
    });
</script>

<script>
    $(document).ready(function () {
        $('#statusTable').DataTable({
            ajax: {
                url: '/network/getData/',
                dataSrc: ''
            },
            columns: [
                {
                    data: null,
                    render: function (data, type, row, meta) {
                        return meta.row + 1;
                    }
                },
                { data: 'name', orderable: false },
                { data: 'size' },
                { data: 'format', orderable: false },
                {
                    data: null,
                    orderable: false,
                    render: function (data, type, row) {
                        return `
                            <a class="btn btn-success btn-sm me-1" href="analisa${row.format}/${row.id}" target="_blank">
                                Analisa
                            </a>
                            <a class="btn btn-danger btn-sm" href="deleteData/${row.id}">
                                Delete
                            </a>
                        `;
                    }
                }
            ]
        });
    });
</script>

{% endblock content %}
