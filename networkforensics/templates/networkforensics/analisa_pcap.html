{% load static %}
<title>{{ title }}</title>
<link rel="icon" href="{% static 'img/icon.png' %}" type="image/x-icon">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<div class="container mt-4">
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-bold">Metadata</div>
        <div class="card-body">
            <div class="row mb-2">
                <div class="col-md-3 fw-semibold">Nama File</div>
                <div class="col-md-9">{{ metadata.name }}</div>
            </div>
            <div class="row mb-2">
                <div class="col-md-3 fw-semibold">Size File</div>
                <div class="col-md-9">{{ metadata.size }}</div>
            </div>
            <div class="row">
                <div class="col-md-3 fw-semibold">Ext File</div>
                <div class="col-md-9">{{ metadata.format }}</div>
            </div>
        </div>
    </div>
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-bold">Packets Summary</div>
        <div class="card-body">
            <p class="mb-0">{{ summary }}</p>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header fw-bold">Stream Packets</div>
        <div class="card-body">
            <form id="formCheckPacket" method="GET">
                {% csrf_token %}
                <input type="hidden" value="{{id_}}" id="id_" name="id">

                <div class="mb-3">
                    <label class="form-label">IP Source & Destination</label>
                    <select class="form-select" id="ipaddress" onchange="displayTotal()">
                        <option value="" selected disabled>Pilih IP</option>
                        {% for i in ip %}
                            <option value="{{i}}">{{i}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="alert alert-info py-2" id="packet">
                    Total Packet: -
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header fw-bold">Detail Packet</div>
        <div class="card-body">

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Type Packet</label>
                    <input type="text" class="form-control" id="tcp_packet" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Source Port</label>
                    <input type="text" class="form-control" id="source_port" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Destination Port</label>
                    <input type="text" class="form-control" id="destination_port" readonly>
                </div>

                <div class="col-12">
                    <label class="form-label">Bytes Packet</label>
                    <textarea class="form-control" id="bytesPacket" rows="10" readonly></textarea>
                </div>

                <div class="col-12" id="decompressedContainer" hidden>
                    <label class="form-label">Decompressed Packet</label>
                    <textarea class="form-control" id="decompressedPacket" rows="10" readonly></textarea>
                </div>

                <div class="col-12" id="dnsContainer" hidden>
                    <label class="form-label">DNS Query</label>
                    <textarea class="form-control" id="dnsPacket" rows="10" readonly></textarea>
                </div>
            </div>

        </div>
    </div> 
    
    <script>
        function hidden_again() {
            let dnsContainer = document.getElementById('dnsContainer').hidden = true;
            let decompressedContainer = document.getElementById('decompressedContainer').hidden = true;
        }
        function displayTotal() {
            var selectedIpPair = document.getElementById("ipaddress").value;
            var data = {
                {% for ip_pair, number in ip.items %}
                    "{{ ip_pair }}": "{{ number }}",
                {% endfor %}
            };

            var resultDiv = document.getElementById("packet");
            if (selectedIpPair in data) {
                resultDiv.textContent = "Total Packet: " + data[selectedIpPair];

                let id_ = document.getElementById("id_").value;

                fetch(`/network/checkPacket?ip=${selectedIpPair}&id=${id_}`)
                    .then(res => res.json())
                    .then(data => {
                        hidden_again();
                        document.getElementById('tcp_packet').value = data.type;
                        document.getElementById('source_port').value = data.sport;
                        document.getElementById('destination_port').value = data.dport;
                        document.getElementById('bytesPacket').value = data.bytes_data_encode;
                        if(data.decompressed_data_encode != null){
                            let el = document.getElementById('decompressedContainer').removeAttribute('hidden');
                            document.getElementById('decompressedPacket').value = data.decompressed_data_encode;
                        }
                        if(data.dns != null){
                            let el = document.getElementById('dnsContainer').removeAttribute('hidden');
                            document.getElementById('dnsPacket').value = data.dns;
                        }
                    })
                    .catch(err => console.error("Request failed", err));

            } else {
                resultDiv.textContent = "Pilih IP terlebih dahulu";
            }
        }
    </script>
</div>
